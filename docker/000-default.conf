# Healthcheck liviano sin ensuciar access.log con miles de líneas repetidas por día (Docker).
SetEnvIf Request_URI "^/docker-health\.txt$" dontlog=1

<VirtualHost *:80>
	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/html

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined env=!dontlog
</VirtualHost>
